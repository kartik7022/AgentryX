services:
  db:
    image: postgres:16-alpine
    container_name: orch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orchestration
      POSTGRES_PASSWORD: orchestration
      POSTGRES_DB: orchestration
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestration"]
      interval: 5s
      timeout: 5s
      retries: 10

  adapter:
    build:
      context: ./mock_services
      dockerfile: Dockerfile
    container_name: orch_adapter
    restart: unless-stopped
    command:
      ["uvicorn", "adapter_service:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8101:8000"
    environment:
      DATABASE_URL: postgresql://orchestration:orchestration@db:5432/orchestration
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orch_backend
    restart: unless-stopped
    ports:
      - "8060:8060"
    environment:
      DATABASE_URL: postgresql://orchestration:orchestration@db:5432/orchestration
      POSTGRES_DSN: postgresql+psycopg2://orchestration:orchestration@db:5432/orchestration
      JWT_SECRET: dev-orchestration-jwt-secret-change-in-production
      JWT_ALG: HS256
      ADMIN_REQUIRED_ROLE: orchestration_admin
      SERVICE_NAME: orchestration-service
      SERVICE_VERSION: 1.0.0
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: llama-3.3-70b-versatile
      EIVS_ADAPTER_BASE_URL: http://adapter:8000
      SLACK_WEBHOOK_URL: ""
      FRONTEND_URL: "http://localhost:3100"
    depends_on:
      db:
        condition: service_healthy
      adapter:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8060
    container_name: orch_frontend
    restart: unless-stopped
    ports:
      - "3100:80"
    depends_on:
      - backend

volumes:
  postgres_data:
