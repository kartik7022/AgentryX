apiVersion: apps/v1
kind: Deployment
metadata:
  name: docai-service
  namespace: docai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: docai
  template:
    metadata:
      labels:
        app: docai
    spec:
      containers:
        - name: fastapi
          image: yourrepo/docai-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: docai-config
            - secretRef:
                name: docai-secrets
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: docai-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: docai-config
                  key: POSTGRES_DB
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: docai-config
                  key: POSTGRES_PORT
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1000m"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
