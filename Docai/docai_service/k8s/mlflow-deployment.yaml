apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: docai
spec:
  selector:
    app: mlflow
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: docai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: python:3.10-slim
          ports:
            - containerPort: 5000
          command:
            - sh
            - -c
            - >
              pip install mlflow &&
              mlflow server
              --backend-store-uri sqlite:///mlflow.db
              --default-artifact-root /mlruns
              --host 0.0.0.0
              --port 5000
          volumeMounts:
            - name: mlflow-storage
              mountPath: /mlruns
      volumes:
        - name: mlflow-storage
          emptyDir: {}
