server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /datasources {
        proxy_pass http://flowengine-app-2:8000/datasources;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_redirect off;
    }

    location = /datasource-configs {
        proxy_pass http://flowengine-app-2:8000/datasource-configs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_redirect off;
    }

    location = /users {
        proxy_pass http://flowengine-app-2:8000/users;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_redirect off;
    }

    location = /intents {
        proxy_pass http://flowengine-app-2:8000/intents;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_redirect off;
    }

    location = /validation-rules {
        proxy_pass http://flowengine-app-2:8000/validation-rules;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_redirect off;
    }

    location ~ ^/(auth|api|portal|admin|credentials|vault|flowengine|test-connection|save-credentials|datasources|datasource-configs|users|rbac|intents|validation-rules|demo|email-inbox)(/|$) {
        proxy_pass http://flowengine-app-2:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_redirect off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /auth/ {
        proxy_pass http://flowengine-app-2:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
