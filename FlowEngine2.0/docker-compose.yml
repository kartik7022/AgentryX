  killbill-gateway:
    build:
      context: ../KillBill/gateway
      dockerfile: Dockerfile
    container_name: killbill-gateway
    ports:
      - "3002:3002"
      - "3005:3005"
    depends_on:
      killbill:
        condition: service_started
      killbill-catalog-bootstrap:
        condition: service_completed_successfully
    env_file:
      - ../KillBill/gateway/.env
    environment:
      KB_HOST: killbill
      KB_BASE: http://killbill:8080
      KB_WEBHOOK_CALLBACK_URL: http://killbill-gateway:3005/api/webhooks/killbill
      FLOWENGINE_URL: http://app:8000
    networks:
      - flowengine-net-2
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.2.4
    container_name: flowengine-keycloak
    depends_on:
      db:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/AgentryX?currentSchema=keycloak
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      KC_HEALTH_ENABLED: "true"
    ports:
      - "7000:8080"
    command: start-dev --import-realm
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro
    networks:
      - flowengine-net-2
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -ec '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 6s
      retries: 90
      start_period: 60s
    restart: unless-stopped

  keycloak-google-bootstrap:
    image: python:3.11-slim
    container_name: keycloak-google-bootstrap
    depends_on:
      keycloak:
        condition: service_healthy
    env_file:
      - .env
    environment:
      KEYCLOAK_BOOTSTRAP_URL: http://keycloak:8080
      KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME: admin
      KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_BOOTSTRAP_READY_ATTEMPTS: 420
      KEYCLOAK_BOOTSTRAP_READY_DELAY_SECONDS: 2
      KEYCLOAK_BOOTSTRAP_REQUEST_TIMEOUT_SECONDS: 5
      KEYCLOAK_BOOTSTRAP_THEME: agentryx
      KEYCLOAK_BOOTSTRAP_MASTER_LOGIN_THEME: agentryx-keycloak-admin
      GOOGLE_IDP_ALIAS: google
    command: ["python", "/bootstrap-google-idp.py"]
    volumes:
      - ./infra/keycloak/bootstrap-google-idp.py:/bootstrap-google-idp.py:ro
    networks:
      - flowengine-net-2
    restart: "no"

  tenant-ui:
    build:
      context: ./frontend/tenant
      dockerfile: Dockerfile
    container_name: tenant-ui
    ports:
      - "3000:80"
    env_file:
      - ./frontend/tenant/.env.runtime
    environment:
      TENANT_KEYCLOAK_URL: http://localhost:7000
      TENANT_KEYCLOAK_REALM: flowengine
      TENANT_KEYCLOAK_CLIENT_ID: agentryx-app
      TENANT_APP_URL: http://localhost:8001
      TENANT_PORTAL_BASE: /tenant
      TENANT_BILLING_PORTAL_BASE: /tenant/billing
      TENANT_KILLBILL_GATEWAY_URL: http://localhost:3002
    depends_on:
      - app
    networks:
      - flowengine-net-2
    restart: unless-stopped

  admin-ui:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile.admin
    container_name: admin-ui
    ports:
      - "5000:80"
    depends_on:
      - app
    networks:
      - flowengine-net-2
    restart: unless-stopped

networks:
  flowengine-net-2:
    driver: bridge

volumes:
  flowengine-pgdata-2:
  vault-data-2:
  keycloak-data:
  killbill-db-data:
    name: killbill_killbill_db_data
  metabase-data:
    name: killbill-poc_metabase_data
  mautic-db-data:
    name: killbill-poc_mautic_db_data
  mautic-data:
    name: killbill-poc_mautic_data
