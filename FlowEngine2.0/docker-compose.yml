services:
  app:
    build: .
    container_name: flowengine-app-2
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      KILLBILL_GATEWAY_URL: http://killbill-gateway:3002
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_started
      keycloak-google-bootstrap:
        condition: service_completed_successfully
      killbill-gateway:
        condition: service_started
    networks:
      - flowengine-net-2
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: flowengine-postgres-2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: AgentryX
    ports:
      - "5433:5432"
    volumes:
      - flowengine-pgdata-2:/var/lib/postgresql/data
      - ./infra/postgres/init-keycloak-db.sql:/docker-entrypoint-initdb.d/init-keycloak-db.sql
    networks:
      - flowengine-net-2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.14.0
    container_name: flowengine-vault-2
    cap_add:
      - IPC_LOCK
    entrypoint: ["vault"]
    command: ["server", "-config=/vault/config/vault.hcl"]
    volumes:
      - ./infra/vault/vault.hcl:/vault/config/vault.hcl:ro
      - ./infra/vault/adapter-tenant-jwt-policy.hcl:/vault/config/adapter-tenant-jwt-policy.hcl:ro
      - vault-data-2:/vault/file
    ports:
      - "8201:8200"
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
    networks:
      - flowengine-net-2
    restart: unless-stopped

  killbill-db:
    image: killbill/mariadb:0.24
    container_name: killbill-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: killbill
    ports:
      - "3306:3306"
    volumes:
      - killbill-db-data:/var/lib/mysql
    networks:
      - flowengine-net-2
    restart: unless-stopped

  killbill:
    image: killbill/killbill:0.24.10
    container_name: killbill-server
    ports:
      - "8080:8080"
    depends_on:
      killbill-db:
        condition: service_started
    environment:
      KILLBILL_DAO_URL: jdbc:mysql://killbill-db:3306/killbill
      KILLBILL_DAO_USER: root
      KILLBILL_DAO_PASSWORD: killbill
      KB_ADMIN_PASSWORD: password
      JAVA_OPTS: -Dcom.sun.jndi.rmiURLParsing=legacy
      KB_org_killbill_server_test_mode: "true"
    volumes:
      - ./infra/killbill/shiro.ini.template:/var/lib/killbill/config/shiro.ini.template:ro
    networks:
      - flowengine-net-2
    restart: unless-stopped

  killbill-catalog-bootstrap:
    image: curlimages/curl:8.10.1
    container_name: killbill-catalog-bootstrap
    depends_on:
      killbill:
        condition: service_started
    environment:
      KB_URL: http://killbill:8080
      KB_ADMIN_USER: admin
      KB_ADMIN_PASSWORD: password
      KB_API_KEY: company_a
      KB_API_SECRET: company_a_secret
      KB_CATALOG_FILE: /catalog.xml
    entrypoint: ["/bin/sh", "/bootstrap-catalog.sh"]
    volumes:
      - ./infra/killbill/bootstrap-catalog.sh:/bootstrap-catalog.sh:ro
      - ../KillBill/catalog.xml:/catalog.xml:ro
    networks:
      - flowengine-net-2
    restart: "no"

